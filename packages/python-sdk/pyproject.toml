[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agentbaton-sdk"
version = "0.1.0"
description = "Python SDK for AgentBaton platform APIs"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "AgentBaton" }]
license = { text = "MIT" }
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
