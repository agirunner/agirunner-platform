name: Platform Release Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run test suite
        run: corepack pnpm test

  publish_image:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: Platform API
            image_name: agirunner-platform-api
            context: .
            dockerfile: apps/platform-api/Dockerfile
            build_args: ""
          - display_name: Dashboard
            image_name: agirunner-platform-dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
            build_args: VITE_PLATFORM_API_URL=http://localhost:8080
          - display_name: Container Manager
            image_name: agirunner-platform-container-manager
            context: services/container-manager
            dockerfile: services/container-manager/Dockerfile
            build_args: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image references
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          version="${GITHUB_REF_NAME#v}"
          echo "image_ref=ghcr.io/${owner}/${{ matrix.image_name }}:${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.display_name }} image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.image_ref }}
          build-args: ${{ matrix.build_args }}
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}

      - name: Show published image
        run: |
          echo "Published ${{ steps.image.outputs.image_ref }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
