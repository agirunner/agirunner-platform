name: Platform Manual Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v, for example 0.1.0-alpha.1
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release version
        run: bash .github/scripts/release-tags.sh validate-image-tag "${{ inputs.version }}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run platform API unit tests
        run: corepack pnpm --filter @agirunner/platform-api exec vitest run tests/unit

      - name: Run dashboard unit tests
        run: corepack pnpm --filter @agirunner/dashboard test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/container-manager/go.mod
          cache-dependency-path: services/container-manager/go.sum

      - name: Run container-manager unit tests
        working-directory: services/container-manager
        run: go test ./...

  platform_api_integration_test:
    name: Platform API Integration Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release version
        run: bash .github/scripts/release-tags.sh validate-image-tag "${{ inputs.version }}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run platform API integration suite
        run: corepack pnpm --filter @agirunner/platform-api exec vitest run tests/integration

  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    needs:
      - unit_test
      - platform_api_integration_test
    outputs:
      version: ${{ steps.release.outputs.version }}
      git_tag: ${{ steps.release.outputs.git_tag }}
      release_class: ${{ steps.release.outputs.release_class }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: release
        run: |
          version="$(bash .github/scripts/release-tags.sh validate-image-tag "${{ inputs.version }}")"
          git_tag="$(bash .github/scripts/release-tags.sh git-tag-from-image-tag "${version}")"
          release_class="$(bash .github/scripts/release-tags.sh release-class-from-image-tag "${version}")"
          {
            echo "version=${version}"
            echo "git_tag=${git_tag}"
            echo "release_class=${release_class}"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure git tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.release.outputs.git_tag }}" >/dev/null 2>&1; then
            echo "Git tag ${{ steps.release.outputs.git_tag }} already exists." >&2
            exit 1
          fi

      - name: Ensure GitHub release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.release.outputs.git_tag }}" >/dev/null 2>&1; then
            echo "GitHub release ${{ steps.release.outputs.git_tag }} already exists." >&2
            exit 1
          fi

  publish_images:
    name: Publish ${{ matrix.display_name }}
    runs-on: ubuntu-latest
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: Platform API
            image_name: agirunner-platform-api
            context: .
            dockerfile: apps/platform-api/Dockerfile
            build_args: ""
          - display_name: Dashboard
            image_name: agirunner-platform-dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
            build_args: VITE_PLATFORM_API_URL=http://localhost:8080
          - display_name: Container Manager
            image_name: agirunner-platform-container-manager
            context: services/container-manager
            dockerfile: services/container-manager/Dockerfile
            build_args: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure existing GHCR package is public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          visibility="missing"
          if visibility="$(gh api "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${{ matrix.image_name }}" -q '.visibility' 2>/dev/null)"; then
            :
          fi
          if [[ "${visibility}" == "private" ]]; then
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image_name }} is private." >&2
            echo "Make the package public in GitHub package settings before creating a release." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image references
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          version="${{ needs.prepare_release.outputs.version }}"
          mapfile -t tags < <(bash .github/scripts/release-tags.sh publish-tags-from-image-tag "${version}")
          {
            echo "version=${version}"
            echo "image_refs<<EOF"
            for tag in "${tags[@]}"; do
              echo "ghcr.io/${owner}/${{ matrix.image_name }}:${tag}"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.display_name }} image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.image_refs }}
          build-args: |
            AGIRUNNER_IMAGE_VERSION=${{ steps.image.outputs.version }}
            AGIRUNNER_IMAGE_REVISION=${{ github.sha }}
            ${{ matrix.build_args }}
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}

      - name: Ensure released GHCR package is public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          visibility="$(gh api "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${{ matrix.image_name }}" -q '.visibility')"
          if [[ "${visibility}" != "public" ]]; then
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image_name }} is ${visibility}." >&2
            echo "Make the package public in GitHub package settings, then rerun this workflow to create the tag and release." >&2
            exit 1
          fi

      - name: Show published image
        run: |
          echo "Published:"
          printf '%s\n' "${{ steps.image.outputs.image_refs }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - publish_images

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create GitHub release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh_args=(
            release
            create
            "${{ needs.prepare_release.outputs.git_tag }}"
            --target
            "${GITHUB_SHA}"
            --generate-notes
          )
          if [[ "${{ needs.prepare_release.outputs.release_class }}" == "prerelease" ]]; then
            gh_args+=(--prerelease)
          fi
          gh "${gh_args[@]}"

      - name: Show published release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${{ needs.prepare_release.outputs.git_tag }}" --json url,isPrerelease,name
