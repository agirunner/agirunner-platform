name: Runtime Image Release

on:
  workflow_dispatch:
    inputs:
      runtime_image_tag:
        description: Runtime image tag override
        required: false
        type: string
      push_image:
        description: Push image to the private registry
        required: false
        default: true
        type: boolean

jobs:
  publish-runtime-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_ENFORCE: "true"
      PUSH_IMAGE: ${{ inputs.push_image && 'true' || 'false' }}
      RUNTIME_IMAGE_TAG: ${{ inputs.runtime_image_tag }}
      COSIGN_VERIFY_CMD: cosign verify --key "${{ secrets.RUNTIME_COSIGN_PUBLIC_KEY }}" --insecure-ignore-tlog
      SBOM_CMD: syft packages -o spdx-json
      VULN_SCAN_CMD: trivy image --format json --exit-code 1 --severity CRITICAL,HIGH
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Checkout runtime repo
        uses: actions/checkout@v4
        with:
          repository: agirunner/agirunner-runtime
          token: ${{ secrets.RUNTIME_REPO_READ_TOKEN }}
          path: agirunner-runtime

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.RUNTIME_REGISTRY_USERNAME }}
          password: ${{ secrets.RUNTIME_REGISTRY_PASSWORD }}

      - name: Install release tooling
        run: |
          curl -sSfL https://raw.githubusercontent.com/sigstore/cosign/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Build, sign-verify, generate SBOM, and scan runtime image
        run: ./scripts/runtime-image-publish.sh
        env:
          RUNTIME_REPO_PATH: ./agirunner-runtime

      - name: Upload runtime image release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-image-release
          path: dist/images/*
