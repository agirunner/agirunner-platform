name: Platform Manual Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker tag to use for the platform images built in the GitHub runner
        required: true
        default: test

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run test suite
        run: corepack pnpm test

  build_image:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: Platform API
            image_name: agirunner-platform-api
            context: .
            dockerfile: apps/platform-api/Dockerfile
            build_args: ""
          - display_name: Dashboard
            image_name: agirunner-platform-dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
            build_args: "--build-arg VITE_PLATFORM_API_URL=http://localhost:8080"
          - display_name: Container Manager
            image_name: agirunner-platform-container-manager
            context: services/container-manager
            dockerfile: services/container-manager/Dockerfile
            build_args: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.display_name }} image
        run: |
          args=()
          if [ -n "${{ matrix.build_args }}" ]; then
            args+=(${{ matrix.build_args }})
          fi
          docker build "${args[@]}" \
            -f "${{ matrix.dockerfile }}" \
            -t "${{ matrix.image_name }}:${{ inputs.image_tag }}" \
            "${{ matrix.context }}"

      - name: Show built image
        run: docker image inspect "${{ matrix.image_name }}:${{ inputs.image_tag }}" --format '{{.Id}}'
