name: Platform Manual Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker tag to use for the platform images built in the GitHub runner
        required: true
        default: 0.0.0-alpha.0

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate image tag
        run: bash .github/scripts/release-tags.sh validate-image-tag "${{ inputs.image_tag }}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run test suite
        run: corepack pnpm test

  build_image:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: Platform API
            image_name: agirunner-platform-api
            context: .
            dockerfile: apps/platform-api/Dockerfile
            build_args: ""
          - display_name: Dashboard
            image_name: agirunner-platform-dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
            build_args: "--build-arg VITE_PLATFORM_API_URL=http://localhost:8080"
          - display_name: Container Manager
            image_name: agirunner-platform-container-manager
            context: services/container-manager
            dockerfile: services/container-manager/Dockerfile
            build_args: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.display_name }} image
        run: |
          version="$(bash .github/scripts/release-tags.sh validate-image-tag "${{ inputs.image_tag }}")"
          tag_args=()
          mapfile -t publish_tags < <(bash .github/scripts/release-tags.sh publish-tags-from-image-tag "${{ inputs.image_tag }}")
          for tag in "${publish_tags[@]}"; do
            tag_args+=(-t "${{ matrix.image_name }}:${tag}")
          done
          args=(
            --build-arg "AGIRUNNER_IMAGE_VERSION=${version}"
            --build-arg "AGIRUNNER_IMAGE_REVISION=${GITHUB_SHA}"
          )
          if [ -n "${{ matrix.build_args }}" ]; then
            args+=(${{ matrix.build_args }})
          fi
          docker build "${args[@]}" "${tag_args[@]}" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"

      - name: Show built images
        run: |
          mapfile -t publish_tags < <(bash .github/scripts/release-tags.sh publish-tags-from-image-tag "${{ inputs.image_tag }}")
          for tag in "${publish_tags[@]}"; do
            docker image inspect "${{ matrix.image_name }}:${tag}" --format '{{.RepoTags}} {{.Id}}'
          done
