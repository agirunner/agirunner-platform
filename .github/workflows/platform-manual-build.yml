name: Platform Manual Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker tag to use for the platform API image built in the GitHub runner
        required: true
        default: test

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run test suite
        run: corepack pnpm test

  build_image:
    name: Build Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build platform API image
        run: docker build -f apps/platform-api/Dockerfile -t "agirunner-platform:${{ inputs.image_tag }}" .

      - name: Show built image
        run: docker image inspect "agirunner-platform:${{ inputs.image_tag }}" --format '{{.Id}}'
