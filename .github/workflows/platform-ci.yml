name: Platform CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'
  pull_request:

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run platform API unit tests
        run: corepack pnpm --filter @agirunner/platform-api exec vitest run tests/unit

      - name: Run dashboard unit tests
        run: corepack pnpm --filter @agirunner/dashboard test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/container-manager/go.mod
          cache-dependency-path: services/container-manager/go.sum

      - name: Run container-manager unit tests
        working-directory: services/container-manager
        run: go test ./...

  build_images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: unit_test
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: Platform API
            image_name: agirunner-platform-api
            context: .
            dockerfile: apps/platform-api/Dockerfile
            build_args: ""
          - display_name: Dashboard
            image_name: agirunner-platform-dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
            build_args: "--build-arg VITE_PLATFORM_API_URL=http://localhost:8080"
          - display_name: Container Manager
            image_name: agirunner-platform-container-manager
            context: services/container-manager
            dockerfile: services/container-manager/Dockerfile
            build_args: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.display_name }} image
        run: |
          args=()
          if [ -n "${{ matrix.build_args }}" ]; then
            args+=(${{ matrix.build_args }})
          fi
          docker build "${args[@]}" \
            -t "${{ matrix.image_name }}:ci" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"

      - name: Show built image
        run: docker image inspect "${{ matrix.image_name }}:ci" --format '{{.RepoTags}} {{.Id}}'
